<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffeword Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game">
        <section class="main-menu" id="mainMenu">
            <h1 class="menu-title">Caffeword Hunt</h1>
            <p class="menu-subtitle">Find words from the letter circle</p>

            <label class="target-label" for="targetCountSelect">
                Words to find
            </label>

            <select class="target-select" id="targetCountSelect"></select>

            <button class="play-button" id="playButton">Play</button>

            <p class="word-source">
                Word source:
                <a href="https://kaino.kotus.fi/lataa/nykysuomensanalista2024.txt" target="_blank" rel="noopener noreferrer">
                    Kotus — Nykysuomen sanalista 2024
                </a>
            </p>
        </section>

        <section class="game-view hidden" id="gameView">
            <section class="word-area">
                <div class="game-topbar">
                    <button class="back-button" id="backButton">←</button>
                    <div class="progress-text" id="progressText">0 / 5</div>
                    <div class="timer-text" id="timerText">00:00</div>
                </div>

                <div class="word-list" id="wordList"></div>
            </section>

            <div class="message-text" id="messageText"></div>
            <div class="current-word" id="currentWord"></div>

            <section class="letter-circle" id="letterCircle">
                <svg class="selection-lines" id="selectionLines"></svg>
            </section>

            <button class="shuffle-button" id="shuffleButton">↻</button>
        </section>

        <section class="win-screen hidden" id="winScreen">
            <div class="win-card">
                <p class="win-subtitle">Word Hunt Complete</p>
                <h2>You Win!</h2>
                <p class="win-time" id="winTimeText">Time: 00:00</p>
                <p class="win-hints" id="winWordText">Words found: 0</p>

                <button class="win-button" id="restartButton">Restart</button>
                <button class="win-button secondary" id="mainMenuButton">Main Menu</button>
            </div>
        </section>

        <section class="loading-screen hidden" id="loadingScreen">
            <div class="loading-card">
                <div class="loading-spinner"></div>
                <p class="loading-title">Loading</p>
                <p class="loading-text" id="loadingText">Loading word index...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
