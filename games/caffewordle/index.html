<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Circle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game">
    <section class="main-menu" id="mainMenu">
        <h1 class="menu-title">Caffewordle</h1>
        <p class="menu-subtitle">Valitse aihealueet</p>

        <div class="category-list" id="categoryList"></div>

        <button class="play-button" id="playButton">Pelaa</button>

        <p class="word-source">
            Word source:
            <a href="https://kaino.kotus.fi/lataa/nykysuomensanalista2024.txt" target="_blank" rel="noopener noreferrer">
                Kotus — Nykysuomen sanalista 2024
            </a>
        </p>
    </section>

    <section class="game-view hidden" id="gameView">
        <section class="word-area">
    <div class="game-topbar">
        <button class="back-button" id="backButton">←</button>
        <div class="progress-text" id="progressText"></div>
        <div class="timer-text" id="timerText">00:00</div>
    </div>

    <div class="word-list" id="wordList"></div>
</section>

        <div class="current-word" id="currentWord"></div>

        <section class="letter-circle" id="letterCircle">
            <svg class="selection-lines" id="selectionLines"></svg>
        </section>
        <button class="help-button" id="helpButton">?</button>
    </section>

    <section class="win-screen hidden" id="winScreen">
        <div class="win-card">
            <p class="win-subtitle">Puzzle Complete</p>
            <h2>You Win!</h2>
            <p class="win-time" id="winTimeText">Time: 00:00</p>
            <p class="win-hints" id="winHintText">Hints used: 0</p>

            <button class="win-button" id="restartButton">Restart</button>
            <button class="win-button secondary" id="mainMenuButton">Main Menu</button>
        </div>
    </section>

    <section class="loading-screen hidden" id="loadingScreen">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <p class="loading-title">Building Puzzle</p>
            <p class="loading-text" id="loadingText">Loading words...</p>
        </div>
    </section>

</main>

    <script src="script.js"></script>
</body>
</html>
